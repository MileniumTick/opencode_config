name: CI Quality Gates

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────────
  # JOB 1: Validate all JSON and JSONC files
  # ──────────────────────────────────────────────────
  lint-json:
    name: Lint JSON / JSONC
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON files with python3
        run: |
          set -e
          FAIL=0
          echo "=== Scanning for JSON files ==="
          while IFS= read -r -d '' file; do
            echo -n "  Checking $file ... "
            if python3 -m json.tool "$file" > /dev/null 2>&1; then
              echo "OK"
            else
              echo "FAIL"
              python3 -m json.tool "$file" 2>&1 || true
              FAIL=1
            fi
          done < <(find . \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -path "./.secrets/*" \
            \( -name "*.json" -o -name "*.jsonc" \) \
            -print0)
          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "❌ One or more JSON/JSONC files failed validation."
            exit 1
          fi
          echo ""
          echo "✅ All JSON/JSONC files are valid."

  # ──────────────────────────────────────────────────
  # JOB 2: Dependency security audit
  # ──────────────────────────────────────────────────
  audit-deps:
    name: Audit Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run bun audit (high severity)
        run: |
          set -e
          echo "=== Running dependency audit ==="
          # bun audit exits non-zero on vulnerabilities found
          if bun audit --level high 2>&1; then
            echo "✅ No high/critical vulnerabilities found."
          else
            AUDIT_EXIT=$?
            echo ""
            echo "❌ High or critical vulnerabilities detected (exit $AUDIT_EXIT)."
            echo "   Review and patch before merging to main."
            exit $AUDIT_EXIT
          fi

  # ──────────────────────────────────────────────────
  # JOB 3: Secret scan — detect hardcoded credentials
  # ──────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for hardcoded secrets
        run: |
          set -e
          FAIL=0

          echo "=== Secret pattern scan ==="
          echo "Note: {file:.secrets/...} references are ALLOWED — only literal values are flagged."
          echo ""

          # Patterns that indicate a hardcoded secret value (not a reference)
          # We skip the {file:.secrets/...} indirection pattern which is the approved approach.
          PATTERNS=(
            # Generic API key / token assignments (value after colon/equals, quoted, 16+ hex/base64 chars)
            '[Aa][Pp][Ii][_-]?[Kk][Ee][Yy][[:space:]]*[:=][[:space:]]*"[A-Za-z0-9+/=_\-]{16,}"'
            '[Aa][Cc][Cc][Ee][Ss][Ss][_-]?[Tt][Oo][Kk][Ee][Nn][[:space:]]*[:=][[:space:]]*"[A-Za-z0-9+/=_\-]{16,}"'
            '[Ss][Ee][Cc][Rr][Ee][Tt][[:space:]]*[:=][[:space:]]*"[A-Za-z0-9+/=_\-]{16,}"'
            '[Pp][Aa][Ss][Ss][Ww][Oo][Rr][Dd][[:space:]]*[:=][[:space:]]*"[A-Za-z0-9+/=_\-]{8,}"'
            # Common provider key formats
            'sk-[A-Za-z0-9]{20,}'
            'ghp_[A-Za-z0-9]{36}'
            'ghs_[A-Za-z0-9]{36}'
            'AKIA[0-9A-Z]{16}'
          )

          # Files to scan (exclude .git, node_modules, .secrets, and binary files)
          SCAN_DIRS=(
            "."
          )
          EXCLUDE_PATHS=(
            "./.git"
            "./node_modules"
            "./.secrets"
          )

          build_exclude_args() {
            local args=""
            for p in "${EXCLUDE_PATHS[@]}"; do
              args="$args --exclude-dir=${p#./}"
            done
            echo "$args"
          }

          EXCLUDE_ARGS=$(build_exclude_args)

          for pattern in "${PATTERNS[@]}"; do
            echo "  Checking pattern: $pattern"
            # Use grep -rn; skip {file:.secrets/...} matches which are safe references
            MATCHES=$(grep -rEn $EXCLUDE_ARGS "$pattern" . 2>/dev/null \
              | grep -v '{file:\.secrets/' \
              | grep -v '^Binary' \
              || true)
            if [ -n "$MATCHES" ]; then
              echo ""
              echo "  ❌ Potential hardcoded secret found:"
              echo "$MATCHES" | while IFS= read -r line; do
                echo "     $line"
              done
              FAIL=1
            fi
          done

          echo ""
          if [ "$FAIL" -eq 1 ]; then
            echo "❌ Secret scan failed. Review matches above."
            echo "   Use the {file:.secrets/<name>} indirection pattern instead of literal values."
            exit 1
          fi
          echo "✅ No hardcoded secrets detected."

  # ──────────────────────────────────────────────────
  # JOB 4: Smoke test — verify opencode.json is valid
  # ──────────────────────────────────────────────────
  smoke-config:
    name: Smoke Test Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse and validate opencode.json
        run: |
          set -e
          echo "=== opencode.json smoke test ==="

          # Step 1: Confirm file exists
          if [ ! -f "opencode.json" ]; then
            echo "❌ opencode.json not found at repo root."
            exit 1
          fi
          echo "  ✓ opencode.json exists"

          # Step 2: Strict JSON parse
          python3 -c "
          import json, sys

          with open('opencode.json', 'r') as f:
              raw = f.read()

          try:
              config = json.loads(raw)
          except json.JSONDecodeError as e:
              print(f'  ❌ JSON parse error: {e}')
              sys.exit(1)

          print('  ✓ JSON is syntactically valid')

          # Step 3: Structural smoke checks
          errors = []

          # Must be a dict at root
          if not isinstance(config, dict):
              errors.append('root must be a JSON object')

          # No literal secrets — values containing {file:.secrets/...} are OK
          def check_no_literal_secrets(obj, path=''):
              if isinstance(obj, dict):
                  for k, v in obj.items():
                      check_no_literal_secrets(v, f'{path}.{k}')
              elif isinstance(obj, str):
                  import re
                  # Flag long token-like values NOT using the safe {file:} pattern
                  if re.search(r'[A-Za-z0-9+/=_\-]{32,}', obj) and not obj.startswith('{file:'):
                      # Allow URLs and schema references
                      if not obj.startswith('http') and not obj.startswith('https'):
                          errors.append(f'Possible literal secret at {path}: value length {len(obj)}')

          check_no_literal_secrets(config)

          # Recommended top-level keys
          recommended = ['mcp', 'agent', 'provider']
          missing = [k for k in recommended if k not in config]
          if missing:
              print(f'  ⚠  Missing recommended keys: {missing} (not a hard failure)')

          if errors:
              for e in errors:
                  print(f'  ❌ {e}')
              sys.exit(1)

          print('  ✓ No literal secrets detected in config values')
          print('  ✓ opencode.json structural validation passed')
          print()
          print('✅ Smoke test passed.')
          "

      - name: Validate \$schema reference (informational)
        run: |
          if python3 -c "
          import json
          with open('opencode.json') as f:
              c = json.load(f)
          schema = c.get('\$schema', '')
          if schema:
              print(f'  ℹ  \$schema declared: {schema}')
          else:
              print('  ⚠  No \$schema declared (recommended for IDE validation)')
          "; then
            echo "Schema check complete."
          fi
